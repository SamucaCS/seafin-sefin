<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluxo Prestação de Contas - SEAFIN</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="fluxograma_contas.css" />
  </head>
  <body>
    <nav class="top-nav">
      <button onclick="voltar()" class="btn-nav btn-voltar">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>
      <div class="title-nav">
        <i class="fa-solid fa-diagram-project"></i>
        <span>Fluxograma: Prestação de Contas (PDDE)</span>
      </div>
      <button onclick="imprimirFluxo()" class="btn-nav btn-print">
        <i class="fa-solid fa-print"></i> Imprimir
      </button>
    </nav>

    <main class="diagram-area">
      <div class="grid-container">
        <svg class="arrows-layer" width="100%" height="100%">
          <defs>
            <marker
              id="arrowGray"
              markerWidth="10"
              markerHeight="7"
              refX="9"
              refY="3.5"
              orient="auto"
            >
              <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
            </marker>
            <marker
              id="arrowRed"
              markerWidth="10"
              markerHeight="7"
              refX="9"
              refY="3.5"
              orient="auto"
            >
              <polygon points="0 0, 10 3.5, 0 7" fill="#fca5a5" />
            </marker>
          </defs>

          <path
            d="M 660 430 L 590 430"
            stroke="#fca5a5"
            stroke-width="3"
            marker-end="url(#arrowRed)"
            fill="none"
          />

          <path
            d="M 390 430 L 100 430 L 100 280"
            stroke="#fca5a5"
            stroke-width="3"
            marker-end="url(#arrowRed)"
            fill="none"
            radius="10"
          />
        </svg>

        <div class="box red-box correction" style="grid-area: 2 / 1">
          CORREÇÃO<br />ESCOLAR
        </div>

        <div class="box gray-gradient start" style="grid-area: 1 / 2">
          NÃO INICIADA<br />ESCOLA
        </div>
        <div
          class="arrow-vertical"
          style="grid-area: 1 / 2; align-self: end; margin-bottom: -20px"
        >
          ↓
        </div>

        <div class="box green-box" style="grid-area: 2 / 2">
          EM ANDAMENTO<br />ESCOLA
        </div>
        <div
          class="arrow-vertical"
          style="grid-area: 2 / 2; align-self: end; margin-bottom: -20px"
        >
          ↓
        </div>

        <div class="box yellow-box" style="grid-area: 3 / 2">
          AGUARDANDO<br />AVALIAÇÃO<br />URE
        </div>
        <div
          class="arrow-horizontal"
          style="grid-area: 3 / 2; justify-self: end; margin-right: -20px"
        >
          →
        </div>

        <div class="box gray-solid" style="grid-area: 3 / 3">
          EM AVALIAÇÃO<br />SEFIN
        </div>
        <div
          class="arrow-horizontal"
          style="grid-area: 3 / 3; justify-self: end; margin-right: -20px"
        >
          →
        </div>

        <div class="box red-full" style="grid-area: 4 / 3">EM REVISÃO</div>

        <div class="box white-blue" style="grid-area: 3 / 4">
          ANÁLISE<br />APROVADA
        </div>
        <div
          class="arrow-horizontal"
          style="grid-area: 3 / 4; justify-self: end; margin-right: -20px"
        >
          →
        </div>
        <div
          class="arrow-vertical"
          style="
            grid-area: 3 / 4;
            align-self: end;
            margin-bottom: -40px;
            height: 40px;
            color: #fca5a5;
          "
        >
          ↓
        </div>

        <div
          class="circle red-circle"
          style="grid-area: 4 / 4; margin-top: 10px"
        >
          NÃO
        </div>

        <div class="circle blue-circle" style="grid-area: 3 / 5">SIM</div>
        <div
          class="arrow-vertical"
          style="
            grid-area: 3 / 5;
            align-self: start;
            margin-top: -20px;
            color: #93c5fd;
          "
        >
          ↑
        </div>

        <div class="box orange-box" style="grid-area: 2 / 5">
          AGUARDANDO<br />APROVAÇÃO<br />SEDUC
        </div>
        <div
          class="arrow-vertical"
          style="
            grid-area: 2 / 5;
            align-self: start;
            margin-top: -20px;
            color: #93c5fd;
          "
        >
          ↑
        </div>

        <div class="box blue-dark" style="grid-area: 1 / 5">APROVADA</div>
      </div>
    </main>

    <script src="fluxograma_contas.js"></script>
  </body>
</html>
